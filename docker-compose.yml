services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    command: --dev
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      - LIVEKIT_KEYS=devkey:secret

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - LIVEKIT_URL=ws://livekit:7880
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    restart: on-failure

  agent:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - LIVEKIT_URL=ws://livekit:7880
    command: python -m agent.worker dev
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
      backend:
        condition: service_started
    restart: on-failure
